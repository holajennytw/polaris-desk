# ===========================================================
# 離線 / Demo fallback：一鍵起 Postgres + pgvector（預設後端是 BigQuery，見 docs/開發環境_BigQuery.md）
# 用法：make db-up  （或 docker compose up -d db）
# ===========================================================
services:
  db:
    image: pgvector/pgvector:pg16     # 已內建 pgvector extension
    container_name: polaris-db
    environment:
      POSTGRES_USER: polaris
      POSTGRES_PASSWORD: polaris
      POSTGRES_DB: polaris
    ports:
      - "5432:5432"
    volumes:
      - polaris_pgdata:/var/lib/postgresql/data
      - ./scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polaris"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 應用容器（W4 上雲 prep）：目前跑健康檢查骨架（GET /healthz）。
  # 不綁 db —— 預設後端是 BigQuery，健康骨架也不碰資料庫；要離線 fallback 才另跑 db。
  app:
    build: .
    container_name: polaris-app
    env_file: .env
    environment:
      PORT: "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  polaris_pgdata:
